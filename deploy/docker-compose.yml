services:
  node1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: raft-kv-node1
    command:
      - "--id=node1"
      - "--peers=node1=node1:9001:node1:8081,node2=node2:9001:node2:8082,node3=node3:9001:node3:8083"
      - "--data-dir=/data"
      - "--raft-addr=0.0.0.0:9001"
      - "--http-addr=0.0.0.0:8081"
    ports:
      - "8081:8081"
    volumes:
      - node1-data:/data
    networks:
      - raft-kv

  node2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: raft-kv-node2
    command:
      - "--id=node2"
      - "--peers=node1=node1:9001:node1:8081,node2=node2:9001:node2:8082,node3=node3:9001:node3:8083"
      - "--data-dir=/data"
      - "--raft-addr=0.0.0.0:9001"
      - "--http-addr=0.0.0.0:8082"
    ports:
      - "8082:8082"
    volumes:
      - node2-data:/data
    networks:
      - raft-kv

  node3:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: raft-kv-node3
    command:
      - "--id=node3"
      - "--peers=node1=node1:9001:node1:8081,node2=node2:9001:node2:8082,node3=node3:9001:node3:8083"
      - "--data-dir=/data"
      - "--raft-addr=0.0.0.0:9001"
      - "--http-addr=0.0.0.0:8083"
    ports:
      - "8083:8083"
    volumes:
      - node3-data:/data
    networks:
      - raft-kv

networks:
  raft-kv:

volumes:
  node1-data:
  node2-data:
  node3-data:
